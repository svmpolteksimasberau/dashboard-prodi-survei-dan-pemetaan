<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penilaian & Monitoring - SVM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .mhs-card { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .mhs-card:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-blue-900 text-white p-10 rounded-b-[4rem] shadow-2xl mb-10 border-b-8 border-orange-500">
        <div class="container mx-auto max-w-5xl flex justify-between items-center text-center sm:text-left">
            <div class="flex items-center gap-5">
                <a href="dashboard_dosen.html" class="w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-orange-500 rounded-2xl transition-all shadow-lg text-lg"><i class="fas fa-arrow-left"></i></a>
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter leading-none">Monitoring Mahasiswa</h1>
                    <p class="text-orange-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 italic">Persentase Kehadiran & Skor Logbook</p>
                </div>
            </div>
            <button onclick="loadMasterData()" class="w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl transition-all"><i class="fas fa-sync-alt"></i></button>
        </div>
    </nav>

    <div class="container mx-auto px-6 max-w-5xl">
        <div id="loading" class="text-center py-20 text-blue-900/20 font-black uppercase italic animate-pulse"><i class="fas fa-sync fa-spin text-5xl mb-4"></i><br>Sinkronisasi Database Cloud...</div>
        <div id="mhsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="modalDetail" class="fixed inset-0 bg-blue-900/60 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[85vh] rounded-[4rem] overflow-hidden flex flex-col shadow-2xl border-b-[15px] border-orange-500">
            <div class="p-10 bg-blue-900 text-white flex justify-between items-center">
                <div><h2 id="modalNama" class="font-black uppercase italic text-2xl tracking-tighter">--</h2><p id="modalNim" class="text-orange-400 text-[10px] font-bold uppercase tracking-[0.4em] italic mt-1">NIM: --</p></div>
                <button onclick="closeModal()" class="w-12 h-12 bg-white/10 rounded-full hover:bg-white/20"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalContent" class="overflow-y-auto p-10 space-y-6 bg-gray-50 flex-1 scrollbar-hide"></div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby24fUfPoGrvowbD2nqeH0VyJCrat7lsXgpnsfJ1-B2TTu25Qv3O25nHNvmblfVv20b/exec';
        let allLogs = []; let allPresensi = [];

        async function loadMasterData() {
            try {
                const [resLog, resPre] = await Promise.all([
                    fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "readAllLogbook" }) }).then(r => r.json()),
                    fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "readAllPresensi" }) }).then(r => r.json())
                ]);
                allLogs = resLog; allPresensi = resPre;
                renderUI();
            } catch (e) { document.getElementById('loading').innerText = "Gagal memuat database."; }
        }

        function renderUI() {
            document.getElementById('loading').classList.add('hidden');
            const container = document.getElementById('mhsContainer');
            
            const grouped = allLogs.reduce((acc, curr) => {
                if (!acc[curr.nim]) acc[curr.nim] = { nama: curr.nama, nim: curr.nim, logs: [], totalSkor: 0, hadir: 0, sakit: 0, izin: 0 };
                acc[curr.nim].logs.push(curr);
                acc[curr.nim].totalSkor += (parseInt(curr.skor) || 0);
                return acc;
            }, {});

            allPresensi.forEach(p => {
                if (grouped[p.nim]) {
                    if (p.status === "On-Site" || p.status === "WFH") grouped[p.nim].hadir++;
                    else if (p.status === "Sakit") grouped[p.nim].sakit++;
                    else if (p.status === "Izin") grouped[p.nim].izin++;
                }
            });

            container.innerHTML = "";
            Object.values(grouped).forEach(mhs => {
                const total = mhs.hadir + mhs.sakit + mhs.izin;
                const pA = total > 0 ? ((mhs.hadir / total) * 100).toFixed(0) : 0;

                container.innerHTML += `
                    <div class="bg-white p-8 rounded-[3.5rem] shadow-xl border-b-[10px] border-blue-900 mhs-card flex flex-col">
                        <div class="absolute top-0 right-10 bg-blue-900 text-white px-4 py-2 rounded-b-2xl text-[10px] font-black italic">${pA}% ATTEND</div>
                        <div class="flex justify-between items-start mb-6 mt-4">
                            <div class="w-16 h-16 bg-blue-50 rounded-[1.5rem] flex items-center justify-center text-blue-900 text-2xl shadow-inner"><i class="fas fa-user-graduate"></i></div>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-gray-300 uppercase mb-1">Total Skor</p>
                                <p class="text-3xl font-black text-blue-900 tracking-tighter italic">${mhs.totalSkor}</p>
                            </div>
                        </div>
                        <h3 class="font-black text-blue-900 uppercase text-sm leading-tight italic">${mhs.nama}</h3>
                        <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase">NIM: ${mhs.nim}</p>
                        
                        <div class="mt-6 space-y-2">
                            <div class="flex justify-between text-[9px] font-black uppercase text-gray-400 italic">
                                <span class="text-green-600">Hadir: ${mhs.hadir}</span>
                                <span class="text-red-600">Sakit: ${mhs.sakit}</span>
                                <span class="text-orange-600">Izin: ${mhs.izin}</span>
                            </div>
                            <div class="w-full h-3 bg-gray-100 rounded-full flex overflow-hidden">
                                <div style="width: ${pA}%" class="h-full bg-green-500"></div>
                                <div style="width: ${(mhs.sakit/total*100)||0}%" class="h-full bg-red-500"></div>
                                <div style="width: ${(mhs.izin/total*100)||0}%" class="h-full bg-orange-500"></div>
                            </div>
                        </div>

                        <div class="mt-8 pt-6 border-t border-gray-100 flex gap-2">
                            <button onclick="openPortfolio('${mhs.nim}')" class="flex-1 bg-blue-900 text-white font-black py-4 rounded-2xl text-[9px] uppercase tracking-widest shadow-lg italic">Logbook</button>
                            <button onclick="openAttendance('${mhs.nim}')" class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-calendar-check"></i></button>
                        </div>
                    </div>`;
            });
        }

        function openPortfolio(nim) {
            const data = allLogs.filter(l => l.nim == nim);
            document.getElementById('modalNama').innerText = data[0].nama;
            const content = document.getElementById('modalContent');
            content.innerHTML = `<h3 class="text-xs font-black uppercase text-blue-900/40 italic mb-4">Riwayat Logbook</h3>`;
            data.forEach(log => {
                content.innerHTML += `<div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm mb-4">
                    <div class="flex justify-between mb-2"><span class="text-[9px] font-black text-orange-500 italic">${log.tanggal}</span><span class="text-[8px] bg-blue-900 text-white px-3 py-1 rounded-full font-black uppercase italic">${log.jenis}</span></div>
                    <p class="text-[11px] font-bold text-blue-900 uppercase italic">${log.lokasi}</p>
                    <p class="text-[11px] text-gray-500 italic leading-relaxed">"${log.deskripsi}"</p>
                    <div class="mt-4 flex gap-3 border-t pt-4"><a href="${log.foto}" target="_blank" class="text-[9px] font-black text-blue-600 underline uppercase italic">Bukti</a><a href="${log.geotagging}" target="_blank" class="text-[9px] font-black text-green-600 underline uppercase italic">GPS</a></div>
                </div>`;
            });
            document.getElementById('modalDetail').classList.remove('hidden');
        }

        function openAttendance(nim) {
            const data = allPresensi.filter(p => p.nim == nim);
            document.getElementById('modalNama').innerText = data[0] ? data[0].nama : "Data Kosong";
            const content = document.getElementById('modalContent');
            content.innerHTML = `<h3 class="text-xs font-black uppercase text-green-600/40 italic mb-4">Riwayat Presensi (On-Site/WFH)</h3>`;
            data.forEach(p => {
                content.innerHTML += `<div class="bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-sm mb-4 flex justify-between items-center">
                    <div><span class="text-[10px] font-black text-blue-900 italic">${p.tanggal}</span><p class="text-[11px] text-gray-500 italic">${p.keterangan || '-'}</p></div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="px-4 py-2 rounded-full text-[10px] font-black uppercase italic ${p.status === 'Sakit' ? 'bg-red-100 text-red-600' : p.status === 'Izin' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">${p.status}</span>
                        ${p.foto !== "-" ? `<a href="${p.foto}" target="_blank" class="text-[8px] font-bold text-blue-500 underline uppercase">Lihat Bukti</a>` : ""}
                    </div>
                </div>`;
            });
            document.getElementById('modalDetail').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modalDetail').classList.add('hidden'); }
        window.onload = loadMasterData;
    </script>
</body>
</html>
