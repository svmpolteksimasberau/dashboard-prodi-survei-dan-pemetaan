<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logbook Prakerin - SVM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #1e3a8a; }
        .tab-btn.active { background-color: #1e3a8a; color: white; transform: scale(1.05); }
        .glass-card { background: rgba(255, 255, 255, 0.98); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="p-8 text-center text-white">
        <div class="w-20 h-20 bg-white rounded-[1.5rem] flex items-center justify-center shadow-xl mx-auto mb-4 transform -rotate-6 border-4 border-orange-500">
            <i class="fas fa-hard-hat text-blue-900 text-3xl"></i>
        </div>
        <h1 class="font-black text-2xl uppercase tracking-tighter">Logbook Prakerin</h1>
    </div>

    <div class="glass-card mx-6 p-8 rounded-[3rem] shadow-2xl border-b-[12px] border-orange-600">
        <div class="flex gap-3 mb-8 bg-gray-100 p-2 rounded-2xl">
            <button onclick="switchTab('form')" id="btn-form" class="tab-btn active flex-1 py-4 rounded-xl text-[10px] font-black uppercase">Lapor</button>
            <button onclick="switchTab('history')" id="btn-history" class="tab-btn flex-1 py-4 rounded-xl text-[10px] font-black uppercase">Riwayat</button>
        </div>

        <div id="pane-form" class="space-y-5">
            <input type="hidden" id="editRowId">
            <input type="date" id="tgl_kegiatan" class="w-full p-5 bg-gray-50 rounded-2xl border border-gray-100 font-bold text-sm outline-none">
            <input type="text" id="lokasi" placeholder="Lokasi / Area Kerja" class="w-full p-5 bg-gray-50 rounded-2xl border border-gray-100 font-bold text-sm outline-none">
            <select id="jenis" class="w-full p-5 bg-gray-50 rounded-2xl border border-gray-100 font-bold text-sm outline-none">
                <option value="Project">Project (13 Poin)</option>
                <option value="Survei">Survei (10 Poin)</option>
                <option value="Non-Survei">Non-Survei (5 Poin)</option>
                <option value="Administrasi">Administrasi (3 Poin)</option>
            </select>
            <textarea id="deskripsi" placeholder="Detail Tugas Harian" rows="3" class="w-full p-5 bg-gray-50 rounded-2xl border border-gray-100 font-bold text-sm outline-none"></textarea>
            <div class="bg-blue-50 p-6 rounded-[2rem] border-2 border-dashed border-blue-100 text-center">
                <input type="file" id="fotoInput" accept="image/*" class="text-[10px] font-bold">
            </div>
            <button onclick="simpanLaporan()" id="btnSimpan" class="w-full bg-orange-500 text-white font-black py-6 rounded-[2rem] shadow-xl uppercase active:scale-95">Kirim Laporan</button>
        </div>

        <div id="pane-history" class="hidden space-y-4">
            <div class="bg-blue-900 p-6 rounded-3xl text-center text-white">
                <p class="text-[9px] font-black text-orange-400 uppercase tracking-widest mb-1">Total Skor</p>
                <h2 id="overallScore" class="text-5xl font-black italic">0</h2>
            </div>
            <div id="riwayatList" class="space-y-4"></div>
        </div>

        <div class="mt-8 text-center"><a href="gateway_mahasiswa.html" class="text-blue-900 font-black text-[10px] uppercase italic tracking-widest"><i class="fas fa-arrow-left"></i> Kembali ke Menu</a></div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyxg63h40By9379Ij8UgZHNPyCKaZsJVm0BtSgeTWOQARtI07gojTmDtXy1HzFkiaC4/exec";
        const user = JSON.parse(localStorage.getItem('current_user'));
        let listData = [];

        function switchTab(tab) {
            document.getElementById('pane-form').classList.toggle('hidden', tab !== 'form');
            document.getElementById('pane-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('btn-form').classList.toggle('active', tab === 'form');
            document.getElementById('btn-history').classList.toggle('active', tab === 'history');
            if(tab === 'history') fetchRiwayatCloud();
        }

        async function simpanLaporan() {
            const editId = document.getElementById('editRowId').value;
            const btn = document.getElementById('btnSimpan');
            const tgl = document.getElementById('tgl_kegiatan').value;
            const kat = document.getElementById('jenis').value;
            const fotoFile = document.getElementById('fotoInput').files[0];

            if(!tgl || !document.getElementById('lokasi').value) return alert("Lengkapi data!");
            btn.disabled = true; btn.innerText = "MENGUNCI GPS...";

            let maps = "-";
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 8000}));
                maps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            } catch(e) { maps = "GPS OFF"; }

            let skor = (kat === "Project") ? 13 : (kat === "Survei" ? 10 : (kat === "Non-Survei" ? 5 : 3));
            let b64 = ""; if(fotoFile) { const r = new FileReader(); b64 = await new Promise(res => { r.onload = e => res(e.target.result.split(',')[1]); r.readAsDataURL(fotoFile); }); }

            try {
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify({
                    action: "addLogbook", nim: user.id, nama: user.name, tanggal: tgl,
                    lokasi: document.getElementById('lokasi').value, jenis: kat, 
                    deskripsi: document.getElementById('deskripsi').value, foto: b64, 
                    rowId: editId || "ID-" + Date.now(), skor: skor, geotagging: maps
                })});
                alert("✅ BERHASIL!"); location.reload();
            } catch(e) { alert("Error!"); btn.disabled = false; }
        }

        async function fetchRiwayatCloud() {
            const container = document.getElementById('riwayatList');
            container.innerHTML = "<p class='text-center animate-pulse'>Memuat Data...</p>";
            try {
                const r = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "readLogbook", nim: user.id }) });
                listData = await r.json();
                container.innerHTML = ""; let total = 0;
                listData.forEach((item, index) => {
                    total += parseInt(item.skor) || 0;
                    const tglFix = item.tanggal.split('T')[0].split('-').reverse().join('/');
                    container.innerHTML += `<div class="bg-gray-50 p-5 rounded-[2rem] border-l-8 border-blue-900 mb-3 shadow-sm text-left">
                        <div class="flex justify-between text-[9px] font-black text-orange-600 uppercase mb-1"><span>${tglFix}</span><i class="fas fa-edit text-blue-500" onclick="startEdit(${index})"></i></div>
                        <h3 class="font-black text-blue-900 text-sm uppercase">${item.lokasi}</h3>
                        <p class="text-[10px] text-gray-500 italic mt-1">"${item.deskripsi}"</p>
                    </div>`;
                });
                document.getElementById('overallScore').innerText = total;
            } catch (e) { container.innerHTML = "Gagal memuat."; }
        }

        function startEdit(i) {
            const item = listData[i];
            document.getElementById('editRowId').value = item.rowId;
            document.getElementById('tgl_kegiatan').value = item.tanggal.split('T')[0];
            document.getElementById('lokasi').value = item.lokasi;
            document.getElementById('jenis').value = item.jenis;
            document.getElementById('deskripsi').value = item.deskripsi;
            switchTab('form');
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
