<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="theme-color" content="#1e3a8a">
    <title>SVM Dashboard - PSBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; margin: 0; }
        .brand-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); min-height: 160px; }
        .compact-card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="brand-gradient text-white pt-8 pb-20 px-6 rounded-b-[2.5rem] shadow-xl relative">
        <div class="container mx-auto max-w-5xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg overflow-hidden border border-white/10">
                        <img src="logo.png" alt="Logo" class="w-full h-full object-cover scale-105">
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <h1 class="text-2xl font-black tracking-tighter leading-none italic uppercase">PORTAL SVM</h1>
                            <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded-md font-bold text-blue-100 uppercase tracking-widest text-center text-white">PSBC</span>
                        </div>
                        <p class="text-[9px] font-bold text-blue-300 mt-1 uppercase tracking-wider opacity-80 italic">Integrated System of Survey and Mapping</p>
                        <p id="dosenGreet" class="text-sm font-semibold text-white mt-2 italic">Memuat nama...</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-11 h-11 rounded-xl bg-white/10 flex items-center justify-center border border-white/10 active:scale-90 transition-transform">
                    <i class="fas fa-power-off text-base text-red-400"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto max-w-5xl px-4 -mt-10 relative z-10 space-y-4">
        <section class="grid grid-cols-3 gap-3">
            <a href="penilaian_logbook.html" class="compact-card p-4 flex flex-col items-center text-center hover:bg-gray-50 transition-colors">
                <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center mb-2"><i class="fas fa-tasks text-xl"></i></div>
                <span class="text-[9px] font-extrabold uppercase text-slate-600 tracking-tighter">Monitoring Prakerin</span>
            </a>
            <a href="performa_dosen.html" class="compact-card p-4 flex flex-col items-center text-center hover:bg-gray-50 transition-colors">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-2"><i class="fas fa-chart-pie text-xl"></i></div>
                <span class="text-[9px] font-extrabold uppercase text-slate-600 tracking-tighter">Performance</span>
            </a>
            <a href="luaran_dosen.html" class="compact-card p-4 flex flex-col items-center text-center hover:bg-gray-50 transition-colors">
                <div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center mb-2"><i class="fas fa-award text-xl"></i></div>
                <span class="text-[9px] font-extrabold uppercase text-slate-600 tracking-tighter">Research Outputs</span>
            </a>
        </section>

        <section class="compact-card p-6 flex justify-between items-center border-l-[6px] border-orange-500">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic leading-none">Total Accumulated Points</p>
                <div class="flex items-baseline gap-2 mt-2">
                    <h2 id="totalScoreText" class="text-5xl font-black text-slate-800 italic leading-none">0</h2>
                    <span class="text-xs font-bold text-slate-400 uppercase">Points</span>
                </div>
            </div>
            <div class="bg-green-50 px-4 py-2 rounded-full flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-green-700 uppercase tracking-tighter">Sync Active</span>
            </div>
        </section>
    </main>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxZt7H5vtk9f8cSGetLxBo9v1JngqYK0u-QMRyB9ajACf5MFdsd_4U4gePE2yF6kkt_LQ/exec';
        const user = JSON.parse(localStorage.getItem('current_user'));
        
        // Proteksi Halaman
        if(!user || user.role.toUpperCase() !== "DOSEN") {
            window.location.replace('index.html');
        } else {
            document.getElementById('dosenGreet').innerText = "Halo, " + user.name + "!";
        }
        
        // Ambil Data Analytics
        async function fetchDashboardData() {
            try {
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "readDashboardAnalytics", nama_dosen: user.name }) 
                });
                const data = await response.json();
                
                // Gabungkan skor dari performa dan luaran
                const combinedData = [...(data.performa || []), ...(data.luaran || [])];
                const total = combinedData.reduce((a, b) => a + (Number(b.skor) || 0), 0);
                
                document.getElementById('totalScoreText').innerText = total;
            } catch (e) { 
                console.error("Error fetching data:", e); 
            }
        }

        function logout() { 
            if(confirm("Keluar dari Sistem?")) { 
                localStorage.clear(); 
                window.location.replace('index.html'); 
            } 
        }

        window.onload = fetchDashboardData;
    </script>
</body>
</html>
